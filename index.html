<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main>
    <header>
      <h1>Library</h1>
    </header>
    <div class="div-container">
      <div class="div-container__h2">
        <h2 class="div-container">Books</h2>
      </div>
      <table class="table">
        <tr class="table__tr">
          <th class="table__tr__th">Title</th>
          <th class="table__tr__th">Author</th>
          <th class="table__tr__th">Pages</th>
          <th class="table__tr__th">Readed</th>
        </tr>
      </table>
      <dialog id="myDialog">
      </dialog>
      <div class="newBookDiv">
        <button onclick="addBookLibrary()">
          <span>New Book</span>
        </button>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>

</html>
