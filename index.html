<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main>
    <header>
      <h1>Library</h1>
    </header>
    <div>
      <h2>Books</h2>
      <table class="table">
        <tr class="table__tr">
          <th class="table__tr__th">Title</th>
          <th class="table__tr__th">Author</th>
          <th class="table__tr__th">Pages</th>
          <th class="table__tr__th">Readed</th>
        </tr>
      </table>
    </div>
    <button onclick="addBookLibrary()">
      <span>New Book</span>
    </button>
  </main>
  <script src="app.js"></script>
</body>

</html>
